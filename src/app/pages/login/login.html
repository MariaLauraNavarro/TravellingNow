<div class="login-container">
 
  <div class="box">
    <h2>Iniciar Sesión</h2>
 
   
      <div class="input">
        <label>Usuario</label>
    <input type="text" placeholder="Ingrese su usuario " [(ngModel)]="this.myUser.email">
      </div>
 
      <div class="input">
        <label>Contraseña</label>
        <input type="password" placeholder="Ingrese su contraseña"  [(ngModel)]="this.myUser.contrasena">
      </div>
 
      <input type="button" value="ingresar ()" (click)="this.userService.validarUsuario(this.myUser.email,this.myUser.contrasena)">
   
  </div>
 
  <div class="textobajo">
    <h3>¿No tienes una cuenta?</h3>
    <a [routerLink]="'/registro'">Crear usuario</a>
  </div>
 
</div>
